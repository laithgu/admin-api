test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# 阿里云 OSS —— 用 S3 兼容协议（aws-sdk-s3 适配器 + OSS endpoint）
oss:
  service: S3
  access_key_id:     <%= ENV["OSS_ACCESS_KEY_ID"] %>
  secret_access_key: <%= ENV["OSS_ACCESS_KEY_SECRET"] %>
  region:            <%= ENV.fetch("OSS_REGION", "oss-cn-beijing") %>
  bucket:            <%= ENV.fetch("OSS_BUCKET_NAME", "hwb-file") %>
  endpoint:          <%= ENV.fetch("OSS_ENDPOINT", "https://oss-cn-beijing.aliyuncs.com") %>
  # OSS 用虚拟主机风格 URL（bucket.endpoint），不是 path-style
  force_path_style:  false
